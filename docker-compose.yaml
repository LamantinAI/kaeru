name: kaeru

services:
  # Shared cloud tier — one per team. Holds the `shared` nodes initiatives
  # promote to it. TLS, if needed, is terminated by a reverse proxy in
  # front; this service speaks plain HTTP.
  kaeru-cloud:
    build:
      context: .
      dockerfile: docker/Dockerfile.cloud
    environment:
      KAERU_CLOUD_LISTEN_ADDRESS: "0.0.0.0"
      # Bearer token required on every request. Empty = auth disabled
      # (dev only). Set a long random secret for any real deployment.
      KAERU_CLOUD_API_TOKEN: "${KAERU_CLOUD_API_TOKEN:-}"
      RUST_LOG: "${RUST_LOG:-info}"
    volumes:
      - kaeru_cloud_data:/home/kaeru/.local/share/kaeru
    ports:
      - "${KAERU_CLOUD_PORT:-9877}:9877"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9877' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Local daemon — the agent's only surface. Owns the local vault and
  # proxies into kaeru-cloud for sharing / recall.
  kaeru-mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp
    environment:
      KAERU_MCP_LISTEN_ADDRESS: "0.0.0.0"
      # Bridge to the cloud for sharing / recall. Defaults to the compose
      # `kaeru-cloud` service for a full local stack; override with a remote
      # URL when the cloud lives on another host, or set empty to disable the
      # cloud tools. Both sides share KAERU_CLOUD_API_TOKEN.
      #
      # Intentionally NOT `depends_on: kaeru-cloud` — the services are
      # decoupled so you can `docker compose up kaeru-mcp` on its own (cloud
      # elsewhere) without dragging a local cloud along.
      KAERU_MCP_CLOUD_URL: "${KAERU_MCP_CLOUD_URL:-http://kaeru-cloud:9877}"
      KAERU_MCP_CLOUD_TOKEN: "${KAERU_CLOUD_API_TOKEN:-}"
      RUST_LOG: "${RUST_LOG:-info}"
    volumes:
      - kaeru_data:/home/kaeru/.local/share/kaeru
    ports:
      - "${KAERU_PORT:-9876}:9876"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9876' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  kaeru_data:
    driver: local
    name: kaeru-data
  kaeru_cloud_data:
    driver: local
    name: kaeru-cloud-data
