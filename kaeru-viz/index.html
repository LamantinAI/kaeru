<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kaeru — a knowledge galaxy</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="./src/fonts.css" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="graph"></div>

    <header id="hud">
      <div class="seal" title="蛙 — kaeru, &quot;frog&quot;">蛙</div>
      <div class="wordmark">
        <h1>kaeru</h1>
        <span class="sub">memory of record · across agents</span>
      </div>
      <div id="stats" class="stats">loading…</div>
    </header>

    <section id="panel">
      <div class="seg">
        <div class="field">
          <label for="chainPick">reasoning chain</label>
          <select id="chainPick" class="ctl"></select>
        </div>
        <button id="chainPlay" class="btn go">replay</button>
        <button id="chainReset" class="btn">reset</button>
      </div>
      <div class="seg">
        <div class="field">
          <label for="colorMode">colour by</label>
          <select id="colorMode" class="ctl">
            <option value="initiative">initiative</option>
            <option value="tier">tier · hippocampus / cortex</option>
            <option value="layer">layer · importance</option>
          </select>
        </div>
        <label class="toggle"><input type="checkbox" id="glow" checked /><span class="box"></span>layer glow</label>
      </div>
      <div class="seg">
        <div class="field">
          <label for="focus">focus</label>
          <select id="focus" class="ctl"><option value="">all projects</option></select>
        </div>
        <button id="talkBtn" class="btn">guided tour</button>
      </div>
      <div class="seg">
        <div class="field">
          <label>theme</label>
          <div class="themeseg" id="themeSeg" role="group" aria-label="theme">
            <button type="button" data-t="auto">auto</button>
            <button type="button" data-t="light">light</button>
            <button type="button" data-t="dark">dark</button>
          </div>
        </div>
      </div>
      <div class="seg scrub">
        <div class="field" style="flex: 1">
          <label for="time">time-lapse</label>
          <div class="trackrow">
            <input type="range" id="time" min="0" max="100" value="100" />
            <button id="timePlay" class="btn mini" aria-label="play time-lapse"></button>
            <span id="timeLabel" class="val">— full graph —</span>
          </div>
        </div>
      </div>
    </section>

    <aside id="readout"></aside>
    <div id="legend"></div>

    <section id="script" hidden>
      <div class="scriptcard">
        <div class="scriptmeta">
          <span id="scriptTag" class="tag"></span>
          <span id="scriptNum" class="num"></span>
        </div>
        <h2 id="scriptTitle"></h2>
        <p id="scriptNarr"></p>
        <div class="scriptnav">
          <button id="scriptPrev" class="btn">← back</button>
          <span id="scriptDots" class="dots"></span>
          <button id="scriptNext" class="btn go">next →</button>
          <button id="scriptExit" class="btn">exit</button>
        </div>
      </div>
    </section>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
