<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kaeru — a knowledge galaxy</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="graph"></div>

    <header id="hud">
      <h1>kaeru<span class="sub">a memory of record across agents</span></h1>
      <div id="stats" class="stats">loading…</div>
    </header>

    <section id="panel">
      <div class="row">
        <label>Reasoning chain</label>
        <select id="chainPick"></select>
        <button id="chainPlay" class="primary">▶ replay</button>
        <button id="chainReset" class="ghost">reset</button>
      </div>
      <div class="row">
        <label>Color by</label>
        <select id="colorMode">
          <option value="initiative">initiative (galaxy)</option>
          <option value="tier">tier (hippocampus / cortex)</option>
          <option value="layer">layer (importance)</option>
        </select>
        <label class="chk"><input type="checkbox" id="glow" checked /> layer glow</label>
        <label>Focus</label>
        <select id="focus"><option value="">all projects</option></select>
        <button id="talkBtn" class="primary">🎬 Demo</button>
      </div>
      <div class="row">
        <label>Time-lapse</label>
        <input type="range" id="time" min="0" max="100" value="100" />
        <button id="timePlay" class="ghost">▶</button>
        <span id="timeLabel" class="time">— full graph —</span>
      </div>
    </section>

    <aside id="readout"></aside>
    <div id="legend"></div>

    <section id="script" hidden>
      <div class="scriptcard">
        <div class="scriptmeta">
          <span id="scriptTag" class="tag"></span>
          <span id="scriptNum" class="num"></span>
        </div>
        <h2 id="scriptTitle"></h2>
        <p id="scriptNarr"></p>
        <div class="scriptnav">
          <button id="scriptPrev" class="ghost">← back</button>
          <span id="scriptDots" class="dots"></span>
          <button id="scriptNext" class="primary">next →</button>
          <button id="scriptExit" class="ghost">exit</button>
        </div>
      </div>
    </section>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
