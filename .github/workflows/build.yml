name: contaienr build

on:
  push:
    branches:
      - "main"
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: cloud
            file: ./docker/Dockerfile.cloud
            suffix: -cloud
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      output: image
      push: ${{ github.event_name != 'pull_request' }}
      context: .
      file: ${{ matrix.file }}
      meta-images: ghcr.io/${{ github.repository }}${{ matrix.suffix }}
      meta-tags: |
        type=ref,event=branch
        type=ref,event=pr
        type=semver,pattern={{version}}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}